<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RainTrack - Phase 3</title>
    <!-- Phase 7: PWA Links -->
    <link rel="manifest" href="/static/manifest.webmanifest">
    <meta name="theme-color" content="#1f2937">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm p-4">
                    <h1 class="fw-bold">RainTrack</h1>
                    <p class="text-secondary">Record daily rainfall</p>

                    <div id="status" class="alert alert-info py-2"></div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Date</label>
                        <input type="date" id="date" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Rainfall (mm)</label>
                        <input type="number" id="rain" class="form-control" placeholder="e.g. 12.5">
                    </div>

                    
                    <div class="mb-3">
                        <label class="form-label fw-bold" for="photo">Photo of the day</label>
                        <div class="d-flex gap-2">
                            <input class="form-control" id="photo" type="file" accept="image/png, image/jpeg, image/webp" />
                            <button class="btn btn-secondary" id="uploadBtn" type="button">Upload</button>
                        </div>
                        
                        
                        <div class="mt-3 text-center">
                            <img id="photoDisplay" src="" alt="Day photo" class="img-fluid rounded shadow-sm" style="display: none; max-height: 200px;">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button id="saveBtn" class="btn btn-dark">Save</button>
                        <a href="/chart" class="btn btn-dark">View chart</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/entry.js"></script>
</body>
</html>
