<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RainTrack - Chart Phase 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm p-4">
                    <h1 class="fw-bold">RainTrack</h1>
                    <p class="text-secondary">Rainfall chart</p>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Start date</label>
                            <input type="date" id="start" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">End date</label>
                            <input type="date" id="end" class="form-control">
                        </div>
                    </div>

                    <div id="status" class="alert alert-info py-2"></div>

                    <div class="mt-4" style="height: 380px;">
                        <canvas id="chart"></canvas>
                    </div>

                    <div class="mt-4">
                        <button id="refreshBtn" class="btn btn-dark">Refresh</button>
                        <a href="/" class="btn btn-dark">Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/chart.js"></script>
</body>
</html>
